kind = "web"
previewPath = "/"
title = "DeepSync Platform"
version = "1.0.0"
id = "artifacts/deepsync"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25563

[services.development]
run = "pnpm --filter @workspace/deepsync run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/deepsync", "run", "build" ]
publicDir = "artifacts/deepsync/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25563"
BASE_PATH = "/"
